name: Sync Strava Data
on:
  schedule:
    - cron: '0 0 * * *' # Jalan setiap hari jam 00:00
  workflow_dispatch: # Tombol manual untuk testing

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Get Strava Data
        run: |
          # Step ini akan mengambil token baru dan data aktivitas terbaru
          # Hasilnya disimpan ke file 'data/activities.json'
          curl -X POST https://www.strava.com/api/v3/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token > token.json
            
          ACCESS_TOKEN=$(jq -r .access_token token.json)
          
          curl -X GET "https://www.strava.com/api/v3/athlete/activities?per_page=10" \
            -H "Authorization: Bearer $ACCESS_TOKEN" > data/activities.json

      - name: Commit and Push
        run: |
          git config --global user.name 'Strava Bot'
          git config --global user.email 'bot@github.com'
          git add data/activities.json
          git commit -m "Update Strava activities" || exit 0
          git push
