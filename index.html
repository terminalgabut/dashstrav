<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashstrav Pro | Strava Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        strava: '#FC4C02',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
    /* Nav Icon Styling */
    .nav-icon {
        @apply p-2.5 rounded-2xl text-slate-400 transition-all flex items-center justify-center;
    }

    .nav-icon:hover {
        @apply bg-slate-50 text-slate-600;
    }

    /* Active State: Icon berubah warna & ada background tipis */
    .router-link-active.nav-icon {
        background-color: #FFF2ED !important; /* Warna orange sangat muda */
        color: #FC4C02 !important;
    }

    .nav-icon i {
        stroke-width: 2.5px;
    }

    /* Hilangkan garis bawah lama jika masih ada */
    .router-link-active::after {
        display: none !important;
    }

    [v-cloak] { display: none; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="app" v-cloak>
        <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-[100] border-b border-slate-100">
            <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16">
                <router-link to="/" class="font-black italic text-2xl text-strava tracking-tighter hover:opacity-80 transition-opacity">
                    DASHSTRAV
                </router-link>
                
                <div class="flex gap-2 md:gap-4 items-center">
    <router-link to="/statistics" class="nav-icon group" title="Statistik">
        <i data-lucide="bar-chart-3" data-lucide-stroke-width="3" class="w-5 h-5 transition-all"></i>
    </router-link>
    
    <router-link to="/activities" class="nav-icon group" title="Aktivitas">
        <i data-lucide="activity" data-lucide-stroke-width="3" class="w-5 h-5 transition-all"></i>
    </router-link>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 py-8 min-h-screen">
            <router-view v-slot="{ Component }">
                <transition name="fade" mode="out-in">
                    <keep-alive :include="['Dashboard', 'Activities', 'Statistics']">
                        <component :is="Component" />
                    </keep-alive>
                </transition>
            </router-view>
        </main>

        <footer class="max-w-5xl mx-auto px-4 py-10 border-t border-slate-200 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Powered by Strava API & Vue 3</p>
        </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.2.1/src/polyline.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="./js/app.js" type="module"></script>
    <script>
    // Memastikan ikon navigasi statis langsung muncul
    const initLucide = () => {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    };
    
    // Coba render saat DOM siap
    document.addEventListener('DOMContentLoaded', initLucide);
    
    // Coba render lagi saat semua script (termasuk app.js) selesai load
    window.addEventListener('load', initLucide);
    </script>
</body>
</html>
